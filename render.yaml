databases:
  - name: mailsender-db
    plan: free
    databaseName: mailsender
    user: mailsender

services:
  - type: web
    name: mailsender
    runtime: node
    plan: starter
    buildCommand: npm run build:render
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: mailsender-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://mailsender.onrender.com
      - key: UPLOAD_DIR
        value: /opt/render/project/storage
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
    disk:
      name: mailsender-storage
      mountPath: /opt/render/project/storage
      sizeGB: 1
